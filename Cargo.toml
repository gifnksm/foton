[workspace]
members = [ "xtask" ]

[package]
name = "foton"
version = "0.1.0"
edition = "2024"
rust-version = "1.88.0"
description = "Manage fonts as packages. Install and update directly from GitHub Releases."
readme = "README.md"
repository = "https://github.com/gifnksm/foton"
license = "MIT OR Apache-2.0"
keywords = []
categories = []

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[package.metadata.cargo-sync-rdme.badge]
style = "flat-square"

[package.metadata.cargo-sync-rdme.badge.badges]
maintenance = true
license = { link = "#license" }
crates-io = true
rust-version = true
github-actions = { workflows = "ci.yml" }
codecov = true

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/v{ version }/{ name }-v{ version }-{ target }.{ archive-format }"
bin-dir = "{ bin }{ binary-ext }"
pkg-fmt = "tgz"

[dependencies]
clap = { version = "4.6", features = ["derive"] }
clap_complete = "4.6"
clap_complete_nushell = "4.6"
clap_mangen = "0.3"

[dev-dependencies]
[build-dependencies]

[profile.release]
strip = true

[badges]
maintenance = { status = "actively-developed" }
